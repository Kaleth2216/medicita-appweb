spring:
  application:
    name: medicita

  datasource:
    url: jdbc:postgresql://localhost:5432/medicita_db
    username: medicita_user
    password: medicita_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  security:
    user:
      name: ""
      password: ""
      roles: []

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: medicita-secret-key-for-jwt-authentication-2026-calidad-software
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.medicita: DEBUG
    org.springframework.security: INFO
