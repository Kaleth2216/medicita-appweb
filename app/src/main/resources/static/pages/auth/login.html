<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

  <div class="auth-card card p-4 mx-3">
    <div class="text-center mb-4">
      <div class="auth-logo mb-2"><i class="bi bi-hospital-fill"></i></div>
      <h1 class="h4 fw-bold mb-0">MediCita</h1>
      <p class="text-muted small">Sistema de gestión de citas médicas</p>
    </div>

    <div id="alert-box" class="alert alert-danger alert-dismissible fade d-none" role="alert">
      <span id="alert-msg"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form id="form-login" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="usuario@ejemplo.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" id="btn-submit" class="btn btn-primary w-100 fw-semibold">
        Iniciar sesión
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      ¿No tienes cuenta?
      <a href="register.html" class="text-decoration-none fw-semibold">Regístrate aquí</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { saveAuth, isAuthenticated, redirectToDashboard } from '../../js/utils/auth.js';
    import { post } from '../../js/utils/api.js';

    if (isAuthenticated()) redirectToDashboard();

    const form   = document.getElementById('form-login');
    const btn    = document.getElementById('btn-submit');
    const alertBox = document.getElementById('alert-box');
    const alertMsg = document.getElementById('alert-msg');

    function showError(msg) {
      alertMsg.textContent = msg;
      alertBox.classList.remove('d-none');
      alertBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('Completa todos los campos.'); return; }

      btn.disabled = true;
      btn.textContent = 'Cargando...';
      alertBox.classList.add('d-none');

      try {
        const data = await post('/auth/login', { email, password });
        saveAuth(data.token, data.email, data.role, data.fullName);
        redirectToDashboard();
      } catch (err) {
        showError(err.message || 'Credenciales incorrectas.');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
