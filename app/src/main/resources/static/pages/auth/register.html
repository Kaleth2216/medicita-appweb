<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light py-4">

  <div class="auth-card card p-4 mx-3" style="max-width:560px">
    <div class="text-center mb-4">
      <div class="auth-logo mb-2"><i class="bi bi-hospital-fill"></i></div>
      <h1 class="h4 fw-bold mb-0">Crear cuenta</h1>
      <p class="text-muted small">Regístrate en MediCita</p>
    </div>

    <div id="alert-box" class="alert alert-dismissible fade d-none" role="alert">
      <span id="alert-msg"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form id="form-register" novalidate>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="firstName" placeholder="Juan" required>
          <div class="invalid-feedback" id="err-firstName"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="lastName" placeholder="Pérez" required>
          <div class="invalid-feedback" id="err-lastName"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Correo electrónico <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="email" placeholder="juan@ejemplo.com" required>
          <div class="invalid-feedback" id="err-email"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="password" placeholder="Mín. 8 caracteres" required minlength="8">
          <div class="invalid-feedback" id="err-password"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Número de documento <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="documentNumber" placeholder="1234567890" required>
          <div class="invalid-feedback" id="err-documentNumber"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Teléfono</label>
          <input type="tel" class="form-control" id="phone" placeholder="3001234567">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Fecha de nacimiento</label>
          <input type="date" class="form-control" id="birthDate">
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primary w-100 fw-semibold mt-4">
        Crear cuenta
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted small mb-0">
      ¿Ya tienes cuenta?
      <a href="login.html" class="text-decoration-none fw-semibold">Inicia sesión</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { post } from '../../js/utils/api.js';

    const form = document.getElementById('form-register');
    const btn  = document.getElementById('btn-submit');
    const alertBox = document.getElementById('alert-box');
    const alertMsg = document.getElementById('alert-msg');

    function showAlert(msg, type = 'danger') {
      alertBox.className = `alert alert-${type} alert-dismissible fade show`;
      alertMsg.textContent = msg;
    }

    function clearErrors() {
      document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
      document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
    }

    function setFieldError(id, msg) {
      const input = document.getElementById(id);
      const err   = document.getElementById(`err-${id}`);
      if (input)  input.classList.add('is-invalid');
      if (err)    err.textContent = msg;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      alertBox.classList.add('d-none');

      const payload = {
        firstName:      document.getElementById('firstName').value.trim(),
        lastName:       document.getElementById('lastName').value.trim(),
        email:          document.getElementById('email').value.trim(),
        password:       document.getElementById('password').value,
        documentNumber: document.getElementById('documentNumber').value.trim(),
        phone:          document.getElementById('phone').value.trim() || null,
        birthDate:      document.getElementById('birthDate').value || null,
      };

      let valid = true;
      if (!payload.firstName)      { setFieldError('firstName', 'El nombre es requerido.');           valid = false; }
      if (!payload.lastName)       { setFieldError('lastName',  'El apellido es requerido.');          valid = false; }
      if (!payload.email)          { setFieldError('email',     'El correo es requerido.');             valid = false; }
      if (payload.password.length < 8) { setFieldError('password', 'Mínimo 8 caracteres.');            valid = false; }
      if (!payload.documentNumber) { setFieldError('documentNumber', 'El documento es requerido.');   valid = false; }
      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'Cargando...';

      try {
        await post('/auth/register', payload);
        showAlert('¡Cuenta creada exitosamente! Ahora puedes iniciar sesión.', 'success');
        alertBox.classList.remove('d-none');
        form.reset();
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showAlert(err.message || 'Error al registrar. Inténtalo de nuevo.');
        alertBox.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
